name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 从 tag 提取版本号 ──────────────────────────────────────
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── 3. 导入 Developer ID 证书 ─────────────────────────────────
      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PWD:    ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$CERTIFICATE_BASE64" | base64 -D -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # -T /usr/bin/codesign: 授权 codesign 访问私钥（无弹窗）
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PWD" \
            -T /usr/bin/codesign

          # 关键：设置分区访问列表，让 Apple 工具链可以无提示使用私钥
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" \
            "$KEYCHAIN_PATH"

          # 加入系统 keychain 搜索列表
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # 打印找到的证书（验证导入成功）
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # ── 4. 存储公证凭据 ───────────────────────────────────────────
      - name: Store notarytool credentials
        env:
          APPLE_ID:      ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PWD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "AC_NOTARY" \
            --apple-id   "$APPLE_ID" \
            --team-id    "$APPLE_TEAM_ID" \
            --password   "$APPLE_APP_PWD"

      # ── 5. 构建 + 签名 + 公证 + 打包 ─────────────────────────────
      - name: Build, sign & notarize
        env:
          VERSION:        ${{ steps.version.outputs.VERSION }}
          SIGN_ID:        ${{ secrets.SIGN_ID }}
          NOTARY_PROFILE: AC_NOTARY
        run: |
          bash scripts/build_release.sh

      # ── 6. 创建 Release 并上传 zip ───────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AIMA v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          body: |
            ## ⬇️ 下载

            👉 点击下方 **`AIMA-${{ steps.version.outputs.VERSION }}.zip`** 下载 App
            （忽略页面底部的 Source code，那是源码不是 App）

            **安装步骤**
            1. 解压得到 `AIMA.app`
            2. 拖入 `/Applications`
            3. 右键 → 打开（首次 Gatekeeper 提示时选「打开」）

            **系统要求**：Apple Silicon · macOS 14 Sonoma 及以上
          files: .build/release/AIMA-${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
